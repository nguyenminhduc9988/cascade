<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cascade{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/htmx.org/dist/ext/sse.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .htmx-indicator { opacity: 0; transition: opacity 200ms ease-in; }
        .htmx-request .htmx-indicator { opacity: 1; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
    </style>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { brand: { 50:'#eef2ff',500:'#6366f1',600:'#4f46e5',700:'#4338ca' } } } }
        }
    </script>
</head>
<body class="h-full text-slate-200">
    <nav class="bg-slate-900/80 backdrop-blur border-b border-slate-800 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2">
                <span class="text-2xl">🌀</span>
                <span class="text-xl font-extrabold tracking-tight">Cascade</span>
                <span class="text-xs text-slate-500 ml-2 hidden sm:inline">agent orchestration</span>
            </a>
            <div class="flex items-center gap-4 text-sm">
                <a href="/" class="hover:text-brand-500 transition">Dashboard</a>
                <span id="sse-status" class="flex items-center gap-1.5 text-slate-400">
                    <span class="w-2 h-2 rounded-full bg-slate-600"></span>offline
                </span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>

    <script src="/static/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
